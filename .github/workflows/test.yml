name: Run Tests
on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Create .env file from secret
        run: echo "${{ secrets.ENV_FILE }}" > .env
      - name: Set up Docker
        uses: docker/setup-buildx-action@v3
      - name: Build and start containers
        run: docker compose up -d --build
      - name: Wait for database                    # ← ADD THIS STEP
        run: |
          echo "Waiting for database to be ready..."
          for i in {1..60}; do
            if docker compose exec -T db pg_isready -U task_user -d task_manager; then
              echo "Database is ready!"
              break
            fi
            if [ $i -eq 60 ]; then
              echo "Database failed to start after 60 attempts"
              docker compose logs db
              exit 1
            fi
            echo "Attempt $i: Database not ready, waiting..."
            sleep 2
          done
      - name: Run tests
        run: docker compose exec -T app php tests/tests.php
      - name: Shut down
        if: always()
        run: docker compose down -v